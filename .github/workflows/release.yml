name: Release

on:
  push:
    tags:
      - 'v*'
  # Allow manual runs from the Actions tab too.
  workflow_dispatch:

permissions:
  contents: write

# Opt into Node 24 for JS-based actions (actions/checkout,
# softprops/action-gh-release, Swatinem/rust-cache, etc.). GitHub
# is forcing this in June 2026 and removing Node 20 in September 2026
# — opting in now means the workflow keeps working seamlessly past
# those deadlines and surfaces incompatibilities early.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  macos:
    name: Build macOS universal .dmg
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      # Defensive: nuke any cached `target/` artifacts before the
      # release build so the DMG is always built from the tag's
      # source. Without this, the rust-cache action can occasionally
      # hand us an older compiled binary whose fingerprint cargo
      # trusts, so the shipped DMG drifts from what the tag actually
      # contains.
      - name: Ensure clean build
        run: cargo clean

      - name: Build universal DMG
        run: make dmg-universal

      - name: Smoke-test universal binary
        run: |
          set -e
          BIN=target/bundle/RustyRequester.app/Contents/MacOS/RustyRequester
          file "$BIN"
          OUT=$("$BIN" --version)
          echo "binary reports: $OUT"
          # Cross-check: when triggered by a tag push (`v0.5.1`), the
          # binary's printed version must match. Catches the "cached
          # rust-cache served the old binary" failure mode that would
          # otherwise ship a stale DMG under a new tag.
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            EXPECTED="${GITHUB_REF##refs/tags/v}"
            if [[ "$OUT" != *"$EXPECTED"* ]]; then
              echo "::error::binary version '$OUT' does not contain tag version '$EXPECTED'"
              exit 1
            fi
          fi

      - name: Show DMG info
        run: |
          ls -la target/bundle/
          file target/bundle/*.dmg

      # Extract the section for this tag from CHANGELOG.md so the
      # release notes on GitHub are the same human-written text shown
      # in-app. Falls back to GitHub's auto-generated notes below the
      # extracted section (action-gh-release appends when both
      # `body_path` and `generate_release_notes` are set).
      - name: Extract release notes from CHANGELOG
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF##refs/tags/v}"
          awk -v ver="$VERSION" '
              /^## \[/ {
                  if (capture) { exit }
                  if (index($0, "[" ver "]")) { capture = 1; next }
              }
              capture { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          # Soft-warn if empty; action-gh-release will still run and
          # fall back to auto-generated notes.
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "::warning::no CHANGELOG section found for v$VERSION — using auto-generated notes only"
          fi
          cat RELEASE_NOTES.md

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/bundle/RustyRequester-v*-macos-universal.dmg
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload as workflow artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: RustyRequester-macos-universal
          path: target/bundle/RustyRequester-v*-macos-universal.dmg

  linux:
    name: Build Linux x86_64 tarball
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2

      # System deps for eframe (X11/Wayland/GL) and rfd (file dialog
      # via GTK3). Ubuntu 24.04 (noble) runners may need `libgtk-3-0t64`
      # instead of `libgtk-3-dev`; we install `-dev` variants at build
      # time and the binary dynamically links against runtime libs
      # present on any glibc-based desktop distro from ~2018 on.
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libwayland-dev libx11-dev libxi-dev libxcursor-dev \
            libxrandr-dev libxinerama-dev libgl1-mesa-dev \
            libgtk-3-dev

      - name: Ensure clean build
        run: cargo clean

      - name: Build Linux tarball
        run: make tarball-linux

      - name: Smoke-test binary
        run: |
          set -e
          BIN=target/x86_64-unknown-linux-gnu/release/rusty-requester
          file "$BIN"
          OUT=$("$BIN" --version)
          echo "binary reports: $OUT"
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            EXPECTED="${GITHUB_REF##refs/tags/v}"
            if [[ "$OUT" != *"$EXPECTED"* ]]; then
              echo "::error::binary version '$OUT' does not contain tag version '$EXPECTED'"
              exit 1
            fi
          fi

      - name: Show tarball info
        run: |
          ls -la target/bundle/
          file target/bundle/*.tar.gz

      # Linux job also reads CHANGELOG (runs in parallel with the
      # macOS job; action-gh-release merges the file list on the
      # release page, `body_path` on either run is idempotent).
      - name: Extract release notes from CHANGELOG
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF##refs/tags/v}"
          awk -v ver="$VERSION" '
              /^## \[/ {
                  if (capture) { exit }
                  if (index($0, "[" ver "]")) { capture = 1; next }
              }
              capture { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "::warning::no CHANGELOG section found for v$VERSION — using auto-generated notes only"
          fi

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/bundle/RustyRequester-v*-linux-x86_64.tar.gz
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload as workflow artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: RustyRequester-linux-x86_64
          path: target/bundle/RustyRequester-v*-linux-x86_64.tar.gz

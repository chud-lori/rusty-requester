name: Release

on:
  push:
    tags:
      - 'v*'
  # Allow manual runs from the Actions tab too.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    name: Build macOS .dmg
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Defensive: nuke any cached `target/` artifacts before the release
      # build so the DMG is always built from the tag's source. Without
      # this, the rust-cache action can occasionally hand us an older
      # compiled binary whose fingerprint cargo trusts, so the shipped
      # DMG drifts from what the tag actually contains. Costs ~45s.
      - name: Ensure clean build
        run: cargo clean

      - name: Build release binary
        run: cargo build --release

      - name: Build .app bundle and .dmg
        run: make dmg

      - name: Show DMG info
        run: |
          ls -la target/bundle/
          file target/bundle/RustyRequester.dmg

      - name: Upload DMG to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/bundle/RustyRequester.dmg
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG as workflow artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: RustyRequester-dmg
          path: target/bundle/RustyRequester.dmg

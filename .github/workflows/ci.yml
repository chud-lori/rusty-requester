name: CI

# Runs on every push and PR (not just tag pushes). Catches broken
# tests, broken builds on Linux, and clippy warnings before they reach
# main / before a release tag is cut.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Skip in-flight runs when a newer commit lands on the same branch /
# PR — we only need the latest result.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Opt into Node 24 for JS-based actions (actions/checkout,
# Swatinem/rust-cache, dtolnay/rust-toolchain). GitHub is forcing
# Node 24 in June 2026 and removing Node 20 in September 2026 —
# opting in now means CI keeps working past those deadlines and
# surfaces incompatibilities early.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test-macos:
    name: Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --all-targets
      - name: cargo build --release
        run: cargo build --release
      - name: --version smoke test
        run: ./target/release/rusty-requester --version

  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libwayland-dev libx11-dev libxi-dev libxcursor-dev \
            libxrandr-dev libxinerama-dev libgl1-mesa-dev \
            libgtk-3-dev
      - name: cargo test
        run: cargo test --all-targets
      - name: cargo build --release
        run: cargo build --release
      - name: --version smoke test
        run: ./target/release/rusty-requester --version

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libwayland-dev libx11-dev libxi-dev libxcursor-dev \
            libxrandr-dev libxinerama-dev libgl1-mesa-dev \
            libgtk-3-dev
      # Clippy with `-D warnings` — the codebase is clippy-clean as of
      # v0.12 hardening. Warnings block merges so we don't regress.
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    # Run separately on a weekly cron plus on PR so drift gets caught
    # but a transient advisory doesn't block unrelated work.
    # Informational for now (continue-on-error) — graduate to blocking
    # once the upstream GTK3-binding warnings from `rfd` clear.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run audit
        run: cargo audit

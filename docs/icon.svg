<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" shape-rendering="geometricPrecision">
  <!-- v12: Phosphor hammer + thick rectangular strike plate + three impact sparks. -->
  <defs>
    <linearGradient id="plinthLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E85A40"/>
      <stop offset="1" stop-color="#B8341F"/>
    </linearGradient>
    <linearGradient id="topSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4E8D4" stop-opacity="0.13"/>
      <stop offset="0.4" stop-color="#F4E8D4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bottomShade" x1="0" y1="0.88" x2="0" y2="1">
      <stop offset="0" stop-color="#1A1210" stop-opacity="0"/>
      <stop offset="1" stop-color="#1A1210" stop-opacity="0.18"/>
    </linearGradient>
    <symbol id="phosphor-hammer" viewBox="0 0 256 256">
      <path d="M251.34,112,183.88,44.08a96.1,96.1,0,0,0-135.77,0l-.09.09L34.25,58.4A8,8,0,0,0,45.74,69.53L59.47,55.35a79.92,79.92,0,0,1,18.71-13.9L124.68,88l-96,96a16,16,0,0,0,0,22.63l20.69,20.69a16,16,0,0,0,22.63,0l96-96,14.34,14.34h0L200,163.3a16,16,0,0,0,22.63,0l28.69-28.69A16,16,0,0,0,251.34,112ZM60.68,216,40,195.31l68-68L128.68,148ZM162.34,114.32,140,136.67,119.31,116l22.35-22.35a8,8,0,0,0,0-11.32L94.32,35a80,80,0,0,0,78.23,20.41l44.22,44.51L188,128.66l-14.34-14.34A8,8,0,0,0,162.34,114.32Zm49,37.66-12-12L228,111.25l12,12Z"/>
    </symbol>
  </defs>
  <rect width="1024" height="1024" rx="224" fill="url(#plinthLight)"/>
  <rect width="1024" height="1024" rx="224" fill="url(#topSheen)"/>
  <rect width="1024" height="1024" rx="224" fill="url(#bottomShade)"/>

  <!-- Hammer (scale 2.0, upper center) -->
  <g transform="translate(266 152) scale(2.0)" fill="#8C2A18" opacity="0.42">
    <use href="#phosphor-hammer" width="256" height="256"/>
  </g>
  <g transform="translate(256 140) scale(2.0)" fill="#F4E8D4">
    <use href="#phosphor-hammer" width="256" height="256"/>
  </g>

  <!-- Impact sparks -->
  <g fill="#F4E8D4" opacity="0.75">
    <rect x="396" y="720" width="36" height="10" rx="5" transform="rotate(-20 414 725)"/>
    <rect x="592" y="720" width="36" height="10" rx="5" transform="rotate(20 610 725)"/>
    <rect x="496" y="716" width="32" height="10" rx="5"/>
  </g>

  <!-- Strike plate: thick rounded slab -->
  <g transform="translate(8 10)" opacity="0.42" fill="#8C2A18">
    <rect x="160" y="762" width="704" height="100" rx="10"/>
  </g>
  <rect x="160" y="762" width="704" height="100" rx="10" fill="#F4E8D4"/>
  <rect x="180" y="768" width="664" height="4" rx="2" fill="#F4E8D4" opacity="0.9"/>
  <rect x="180" y="774" width="664" height="2" rx="1" fill="#1A1210" opacity="0.14"/>
  <rect x="180" y="850" width="664" height="3" rx="1.5" fill="#1A1210" opacity="0.25"/>
</svg>
